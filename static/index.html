<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Radar Amazônico</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    // Inicializa o mapa centrado na Amazônia
    const map = L.map('map').setView([-3.119, -60.0217], 6);

    // Adiciona camada de tiles (mapa base)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Dicionário de marcadores
    const markers = {};

    // Função para atualizar embarcações
    async function atualizarEmbarcacoes() {
      try {
        const resp = await fetch('/embarcacoes');
        const embarcacoes = await resp.json();

        embarcacoes.forEach(emb => {
          if (markers[emb.id]) {
            // Atualiza posição existente
            markers[emb.id].setLatLng([emb.latitude, emb.longitude]);
          } else {
            // Cria novo marcador
            markers[emb.id] = L.marker([emb.latitude, emb.longitude])
              .addTo(map)
              .bindPopup(`<b>${emb.nome}</b><br>${emb.tipo}`);
          }
        });
      } catch (err) {
        console.error("Erro ao buscar embarcações:", err);
      }
    }

    // Atualiza a cada 5s
    setInterval(atualizarEmbarcacoes, 5000);
    atualizarEmbarcacoes();
  </script>
</body>
</html>
